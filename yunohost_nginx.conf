# ==============================================================================
# CONFIGURATION NGINX YUNOHOST POUR VOS (BYPASS SSO RSS PODCAST)
# ==============================================================================
# Emplacement suggéré sur le VPS YunoHost :
# /etc/nginx/conf.d/votre_domaine.d/vos_rss.conf
# (Remplacer 'votre_domaine' par votre vrai nom de domaine YunoHost)
#
# Une fois le fichier créé ou modifié sur le VPS, vérifiez et rechargez :
#   sudo nginx -t
#   sudo systemctl reload nginx
# ==============================================================================

# 1. Bypass SSO YunoHost pour le flux RSS XML Podcast
location /api/podcast/feed.xml {
    # Contourner la protection SSO YunoHost (pas d'inclusion SSO)
    proxy_pass http://127.0.0.1:8000/api/podcast/feed.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 2. Bypass SSO YunoHost pour les fichiers MP3 audio des podcasts
location /api/audio/stream/ {
    # Contourner la protection SSO YunoHost (pas d'inclusion SSO)
    proxy_pass http://127.0.0.1:8000/api/audio/stream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Support du streaming audio / Seek (Range requests)
    proxy_force_ranges on;
}
